<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Raza Imam | Video Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #000; overflow: hidden; }
    body { position: relative; display: flex; align-items: center; justify-content: center; }
    video { display: block; width: 100%; height: 100%; object-fit: contain; }
    .close-btn {
      position: fixed; top: 16px; right: 16px; z-index: 10;
      display: grid; place-items: center;
      width: 44px; height: 44px; border: none; border-radius: 50%;
      background: rgba(255,255,255,0.1); color: #fff;
      cursor: pointer; transition: background 0.2s;
      font-size: 24px; line-height: 1;
    }
    .close-btn:hover { background: rgba(255,255,255,0.25); }
    .close-btn svg { width: 24px; height: 24px; stroke: currentColor; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  </style>
</head>
<body>
  <button class="close-btn" id="closeBtn" aria-label="Close video">
    <svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>
  <video id="player" controls autoplay playsInline></video>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var src = params.get('src');
      var player = document.getElementById('player');
      if (src) { player.src = src; }
      document.getElementById('closeBtn').addEventListener('click', function() {
        if (window.history.length > 1) { window.history.back(); }
        else { window.close(); }
      });
    })();
  </script>
</body>
</html>
